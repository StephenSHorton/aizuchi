[package]
name = "tauri-plugin-aizuchi-audio"
description = "Streaming PCM microphone capture for Aizuchi on iOS, with background-audio survival"
version = "0.1.0"
edition = "2021"
authors = ["Stephen Horton"]
license = "AGPL-3.0-or-later"
repository = "https://github.com/StephenSHorton/aizuchi"
# `links` is required by Tauri's mobile-plugin build script so the iOS
# static library symbol (`init_plugin_aizuchi_audio`) is unique across
# linked plugins.
links = "tauri-plugin-aizuchi-audio"

[package.metadata.platforms.support]
windows = { level = "none", notes = "Desktop builds compile, but no capture is performed." }
linux = { level = "none", notes = "Desktop builds compile, but no capture is performed." }
macos = { level = "partial", notes = "Compiles. Live capture stays on the existing cpal path in src-tauri/src/audio.rs; this crate is iOS-targeted." }
android = { level = "none", notes = "Out of scope for AIZ-57. Filed as a separate spike." }
ios = { level = "full", notes = "AVAudioSession + AVAudioEngine, streaming PCM via tauri::ipc::Channel." }

[build-dependencies]
# Tauri's plugin build helper. Same crate the official mobile plugins use
# (see `plugins-workspace/plugins/haptics/build.rs`). It generates the
# `permissions/autogenerated/` schema, validates command names, and points
# the iOS/Android build at the right native module directory.
tauri-plugin = { version = "2", features = ["build"] }

[dependencies]
tauri = { version = "2" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
log = "0.4"

# On iOS the Tauri build adds the Swift package as a static library and
# this dep brings in the `ios_plugin_binding!` macro + `wry` glue.
[target.'cfg(target_os = "ios")'.dependencies]
tauri = { version = "2", features = ["wry"] }
